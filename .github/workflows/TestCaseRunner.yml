name: Test Case Runner
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx cucumber-js --require-module ts-node/register --require tests/step-definitions/**/*.ts --require tests/support/**/*.ts tests/features/security-validation.feature --format progress --format html:report.html
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: C:\vulnerable-springboot-app-feature-2.1\report.html
        retention-days: 30

